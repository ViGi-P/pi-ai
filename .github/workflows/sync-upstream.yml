name: Sync Pi AI Package

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mirror repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone upstream repository
        run: |
          git clone https://github.com/earendil-works/pi.git upstream

      - name: Determine latest upstream tag
        id: upstream
        run: |
          cd upstream

          git fetch --tags

          TAG=$(git tag --sort=-version:refname | head -n 1)

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if tag already mirrored
        id: tag_check
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "already_mirrored=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_mirrored=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Export packages/ai from upstream tag
        if: steps.tag_check.outputs.already_mirrored == 'false'
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          cd upstream
          git checkout "$TAG"

          COMMIT_SHA=$(git rev-parse HEAD)

          cd ..

          mkdir export

          rsync -a \
            --delete \
            upstream/packages/ai/ \
            export/

          cat > export/.upstream-source.json <<EOF
          {
            "upstream_repo": "https://github.com/earendil-works/pi",
            "upstream_tag": "$TAG",
            "upstream_commit": "$COMMIT_SHA",
            "source_path": "packages/ai"
          }
          EOF

      - name: Replace repository contents
        if: steps.tag_check.outputs.already_mirrored == 'false'
        run: |
          find . \
            -mindepth 1 \
            -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            ! -name "export" \
            -exec rm -rf {} +

          shopt -s dotglob
          mv export/* .
          rm -rf export

      - name: Commit changes
        if: steps.tag_check.outputs.already_mirrored == 'false'
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No content changes detected."
            exit 0
          fi

          git commit -m "sync: $TAG"

      - name: Push commit
        if: steps.tag_check.outputs.already_mirrored == 'false'
        run: |
          git push origin main

      - name: Create and push tag
        if: steps.tag_check.outputs.already_mirrored == 'false'
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          git tag "$TAG"
          git push origin "$TAG"
